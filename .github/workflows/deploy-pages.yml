name: Deploy to Pages

on:
    push:
        branches:
            - master
            - split-action
    schedule:
        - cron: '0 11 * * 0,1,2,3,4,5,6'

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout main
              uses: actions/checkout@v4
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x

    build-notion-data:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Build notion-data
              run: npm install
              working-directory: notion-data

    fetch-queens-data:
        runs-on: ubuntu-latest
        needs: build-notion-data

        steps:
            - name: Fetch Today Queens Save to Notion
              working-directory: notion-data
              env:
                  NOTION_TOKEN: ${{secrets.NOTION_TOKEN}}
              run: |
                  echo "NOTION_TOKEN=$NOTION_TOKEN" > .env
                  npm run scrape-li
            - name: Fetch Notion Board Data
              working-directory: notion-data
              env:
                  NOTION_TOKEN: ${{secrets.NOTION_TOKEN}}
              run: |
                  echo "NOTION_TOKEN=$NOTION_TOKEN" > .env
                  npm run fetch-boards

    fetch-status-data:
        runs-on: ubuntu-latest
        needs: build-notion-data

        steps:
            - name: Fetch Notion Data
              working-directory: notion-data
              env:
                  NOTION_TOKEN: ${{secrets.NOTION_TOKEN}}
              run: |
                  echo "NOTION_TOKEN=$NOTION_TOKEN" > .env
                  npm run fetch-status

    deploy:
        runs-on: ubuntu-latest
        needs: [fetch-status-data, fetch-queens-data]

        steps:
            - name: Build
              run: npm install
              working-directory: brianl.am
            - name: Deploy
              working-directory: brianl.am
              env:
                  NAME: lambrian
                  EMAIL: brianlam93@gmail.com
              run: |
                  echo "Hello from deploy"
